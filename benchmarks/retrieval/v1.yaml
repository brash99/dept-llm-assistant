benchmarks:
  - id: travel_policy
    category: policy
    question: What is the CNU travel reimbursement policy?
    required_sources:
      - Travel/PCSE TRAVEL GUIDE.docx
    acceptable_sources:
      - Travel/Faculty Travel Procedures.docx
      - Travel/Procedural Guidelines Student Travel Fund.docx
    bad_source_patterns:
      - Syllabi/

  - id: cs_machine_learning_physics
    category: advising
    question: What do the Computer Science four-year plans recommend for students interested in machine learning?
    required_title_contains:
      - Four-Year Plan
    required_text_contains:
      - machine learning
      - PHYS 201-202

  - id: serc_march_events
    category: operations
    question: Event Planning spreadsheet March events 
    required_sources:
      - Event Planning spreadsheet.xlsx
    bad_source_patterns:
      - Syllabi/
      - PCSE_Events/Department Meetings/
    acceptable_sources:
      - Copy of Event Planning spreadsheet.xlsx

  - id: faculty_travel_procedures
    category: policy
    question: What are the procedures for faculty travel reimbursement?
    required_sources:
      - Travel/Faculty Travel Procedures.docx
    acceptable_sources:
      - Travel/PCSE TRAVEL GUIDE.docx
    bad_source_patterns:
      - Syllabi/

  - id: student_travel_fund
    category: policy
