policy_id: cnu.analytical_workforce.current_directory.v1
version: "1.1"
description: >-
  Conservative analytical proxy for current full-time instructional faculty.
  It is not an HR roster or authoritative employment-status assertion.
starting_population: latest_faculty_directory_snapshot
recent_teaching_academic_years: 3
target_reference_population: 275
instructional_ranks:
  - professor
  - associate_professor
  - assistant_professor
  - lecturer
  - instructor
exclude_statuses: [emeritus, emerita, retired, former]
exclude_categories: [adjunct]
review_administrative_roles: [provost, vice_provost, dean]
instructional_administrative_roles: [department_chair, program_director, graduate_program_director]
administrative_only_roles: [office_director]
visiting_treatment: review_required
missing_recent_teaching_treatment: retain_with_limitation
missing_safe_unit_treatment: department_review_required
staff_title_patterns:
  - staff
  - secretary
  - administrative assistant
  - coordinator
