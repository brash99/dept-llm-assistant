campaign:
  key: cnu_public_web_phase_1
  name: CNU Public Web Observation Campaign — Phase 1
  description: >
    A stratified observation campaign based on institutional authority,
    decision relevance, evidentiary density, website topology, and current
    semantic-ecosystem coverage.
  observation_budget: 1000
  methodology:
    - Oversample authoritative but compact institutional habitats.
    - Include PDFs and structured documents where evidentiary density is high.
    - Cap news archives and directory-like collections.
    - Preserve each observer in an independent acquisition manifest.

observers:
  - name: academics
    type: web
    enabled: true
    source_organization: Christopher Newport University
    authority: institutional_primary
    purposes:
      - academic_programs
      - curriculum
      - departments
    priority_terms:
      - programs
      - departments
      - major
      - minor
      - curriculum
      - degree
    seed_urls:
      - https://cnu.edu/academics/
    allowed_hosts:
      - cnu.edu
    allowed_prefixes:
      - https://cnu.edu/academics/
    storage_root: storage/raw_web
    manifest: storage/manifests/cnu_academics_v2.jsonl
    budget: 260
    max_depth: 10
    request_delay_seconds: 0.25
    respect_robots: false
    authorization: &cnu_authorization
      mode: institutional_approval
      approved_by:
        - Quentin Kidd
        - Carolyn Davis
      scope:
        - https://cnu.edu/
        - https://my.cnu.edu/
      notes: >
        Authorized for the Institutional Semantic Observatory project.
    media_policy:
      follow_html: true
      follow_pdf: true
      follow_docx: true
      follow_xlsx: true
      follow_csv: true

