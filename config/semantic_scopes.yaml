    kind: department
    label: Department of Accounting and Finance
    aliases: [accounting_and_finance]

  - id: department:biology_chemistry_and_environmental_science
    kind: department
    label: Department of Biology, Chemistry, and Environmental Science
    aliases: [biology_chemistry_and_environmental_science, biology, chemistry]

  - id: department:communication_studies
    kind: department
    label: Department of Communication Studies
    aliases: [communication, communication_studies]

  - id: department:economics
    kind: department
    label: Department of Economics
    aliases: [economics]

  - id: department:english
    kind: department
    label: Department of English
    aliases: [english]

  - id: department:fine_art_and_art_history
    kind: department
