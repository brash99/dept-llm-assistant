project:
  root: /work/brash/dept-llm-assistant

storage:
  raw_drive: storage/raw_drive
  raw_web: storage/raw_web
  normalized: storage/normalized
  constitutional: storage/constitutional
  chunks: storage/chunks
  embeddings: storage/embeddings
  vector_db: storage/vector_db
  models: storage/models
  cache: storage/cache
  logs: storage/logs

llm:
  base_url: http://localhost:8001/v1
  model: qwen3-32b-local

google_drive:
  remote: gdrive

corpus:
  exclude_paths:
    - "Advising/Advisors"
    - "Student Pictures"
    - "Birthdays"
    - "PCSE Phone List"
    - "Faculty Transitions"
  exclude_extensions:
    - ".db"
    - ".tmp"
    - ".pyc"
    - ".ds_store"
  exclude_directories:
    - _conversion_test
    - cache
    - .git
  exclude_hidden: true

chunking:
  chunk_size: 1000
  overlap: 200

  # Optional safety valve.
  # null = unlimited
  max_chunks_per_document: null

embedding:
  model: BAAI/bge-base-en-v1.5
  batch_size: 128
  device: cuda

reranking:
  enabled: true
  model: cross-encoder/ms-marco-MiniLM-L-6-v2
  device: cuda
  # null disables hard filtering while we calibrate score ranges
  min_score: null

retrieval:
  constitutional_top_k: 2
  empirical_top_k: 10
  fetch_k: 200

normalization_sources:
  - key: cnu_website
    root: storage/raw_web/cnu_website
    priority: 10
    description: Curated public Christopher Newport University web corpus

  - key: schev_policy
    root: storage/raw_web/schev_policy
    priority: 20
    description: SCHEV policy, academic-affairs, and program-approval materials

  - key: schev_statistics
    root: storage/raw_web/schev_statistics
    priority: 30
    description: SCHEV research, statistics, enrollment, and institutional data

  - key: virginia_budget
    root: storage/raw_web/virginia_budget
    priority: 40
    description: Virginia state budget and higher-education funding materials

  - key: abet_standards
    root: storage/raw_web/abet_standards
    priority: 50
    description: ABET accreditation criteria and guidance

  - key: sacscoc_standards
    root: storage/raw_web/sacscoc_standards
    priority: 60
    description: SACSCOC accreditation standards and resource materials

  - key: sec_google_drive
    root: storage/raw_drive
    priority: 100
    description: Internal School of Engineering and Computing Google Drive corpus
