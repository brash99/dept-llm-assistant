project:
  root: /work/brash/dept-llm-assistant

storage:
  raw_drive: storage/raw_drive
  raw_web: storage/raw_web
  normalized: storage/normalized
  constitutional: storage/constitutional
  chunks: storage/chunks
  embeddings: storage/embeddings
  vector_db: storage/vector_db
  models: storage/models
  cache: storage/cache
  logs: storage/logs

llm:
  base_url: http://localhost:8005/v1
  model: qwen3-32b-local

google_drive:
  remote: gdrive

corpus:
  exclude_paths:
    - "Advising/Advisors"
    - "Student Pictures"
    - "Birthdays"
    - "PCSE Phone List"
    - "Faculty Transitions"
  exclude_extensions:
    - ".db"
    - ".tmp"
    - ".pyc"
    - ".ds_store"
  exclude_directories:
    - _conversion_test
    - cache
    - .git
  exclude_hidden: true

chunking:
  chunk_size: 1000
  overlap: 200

  # Optional safety valve.
  # null = unlimited
  max_chunks_per_document: null

embedding:
  model: BAAI/bge-base-en-v1.5
  batch_size: 128
  device: cuda

reranking:
  enabled: true
  model: cross-encoder/ms-marco-MiniLM-L-6-v2
  device: cuda
  # null disables hard filtering while we calibrate score ranges
  min_score: null
