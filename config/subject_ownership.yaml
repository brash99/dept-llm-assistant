    record_id: cnu.subject.phys.sec.v1
    subject_code: PHYS
    display_name: Physics
    owning_academic_unit_id: academic_unit:sec
    analytical_academic_unit_id: academic_unit:sec
    relationship_type: owns_instructional_subject
    mapping_status: intentionally_grouped_department_equivalent
    mapping_method: governed_registry_lookup
    confidence: 1.0
    review_status: governed
    effective_start_term: null
    effective_end_term: null
    evidence:
      - source: config/institutional_programs.yaml
        source_type: governed_registry
        assertion: The governed program registry places this instructional subject within SEC.
    rationale: >-
      SEC owns this instructional subject and is the governed faculty-home and
      workforce-allocation unit. This does not create a separate department or
      assert faculty-to-major membership.
    notes: Workforce aggregation only; formal organizational facts are resolved from the unit registry.

