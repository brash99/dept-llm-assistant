        source_type: administrative_review
        assertion: >-
          This operational scheduling prefix identifies Music instruction owned
          by the Department of Music, Theatre, and Dance and represented in the
          catalog under the broader MUSC curriculum.
    rationale: >-
      Preserve the operational prefix as schedule evidence while assigning its
      workforce observations to Music, Theatre, and Dance; the prefix does not
      establish a separate department or catalog subject family.
    notes: Governed operational alias; no independent catalog section is required.

