  - record_id: cnu.subject.pcse.sec.v1
    subject_code: PCSE
    display_name: Physics, Computer Science and Engineering
    owning_academic_unit_id: academic_unit:sec
    analytical_academic_unit_id: academic_unit:sec
    relationship_type: owns_instructional_subject
    mapping_status: intentionally_grouped_department_equivalent
    mapping_method: institutional_expert_review
    confidence: 1.0
    review_status: governed
    effective_start_term: null
    effective_end_term: null
    evidence:
      - source: institutional_review:edward_brash:pcse_subject_ownership:2026-07-22
        source_type: institutional_expert
        assertion: >-
          PCSE courses belong to the School of Engineering and Computing and
          roll up to SEC for workforce analysis; PCSE is not a formal department.
        reviewer: Edward Brash
        review_date: 2026-07-22
    rationale: >-
      Institutional review confirms that PCSE is an instructional and
