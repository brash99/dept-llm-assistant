title: Christopher Newport University Governed Undergraduate Major Capstone Registry
catalog_year: 2025-26
source: data/acquisition/catalogs/2025-26-undergraduate_catalog.pdf
description: >-
  Required capstone relationships for every current undergraduate major in the
  governed major registry. This registry records only culminating requirements
  supported by the 2025-26 Undergraduate Catalog. It does not contain full
  curricula, graduate estimates, or degree-completion counts.

