schema_version: 1
registry_id: cnu.undergraduate_majors
title: Christopher Newport University Governed Undergraduate Major Registry
as_of_catalog_year: 2025-26
description: >-
  Governed undergraduate-major facts assembled from official undergraduate
  catalogs, the existing SEC program registry, and Quentin Kidd's pasted
  department-major administrative evidence. Completion counts were not
  ingested. Conflicting ownership and naming evidence remains explicit.

source_definitions:
  catalog_2025_26: &catalog
    source_type: official_catalog
    source: data/acquisition/catalogs/2025-26-undergraduate_catalog.pdf
    catalog_year: 2025-26
  quentin_major_cell: &quentin
    source_type: authoritative_administrative_mapping
    source: Quentin Kidd workbook pasted department-major cell
  sec_registry: &sec_registry
    source_type: governed_program_registry
    source: config/institutional_programs.yaml

owner_assertion_templates:
  ACFN: &owner_acfn
    owner_code: ACFN
    academic_unit_id: academic_unit:department_accounting_finance
    source: Quentin Kidd workbook pasted department-major cell
    source_type: authoritative_administrative_mapping
    assertion: Quentin maps this major to ACFN.
  BCES: &owner_bces
    owner_code: BCES
    academic_unit_id: academic_unit:department_biology_chemistry_environmental_science
    source: Quentin Kidd workbook pasted department-major cell
    source_type: authoritative_administrative_mapping
    assertion: Quentin maps this major to BCES.
  COMM: &owner_comm
    owner_code: COMM
    academic_unit_id: academic_unit:department_communication_studies
    source: Quentin Kidd workbook pasted department-major cell
    source_type: authoritative_administrative_mapping
    assertion: Quentin maps this major to COMM.
  ECON: &owner_econ
    owner_code: ECON
    academic_unit_id: academic_unit:department_economics
    source: Quentin Kidd workbook pasted department-major cell
    source_type: authoritative_administrative_mapping
    assertion: Quentin maps this major to ECON.
  ENGL: &owner_engl
    owner_code: ENGL
    academic_unit_id: academic_unit:department_english
    source: Quentin Kidd workbook pasted department-major cell
    source_type: authoritative_administrative_mapping
    assertion: Quentin maps this major to ENGL.
  FAAH: &owner_faah
    owner_code: FAAH
    academic_unit_id: academic_unit:department_fine_art_art_history
    source: Quentin Kidd workbook pasted department-major cell
    source_type: authoritative_administrative_mapping
    assertion: Quentin maps this major to FAAH.
  HIST: &owner_hist
    owner_code: HIST
    academic_unit_id: academic_unit:department_history
    source: Quentin Kidd workbook pasted department-major cell
    source_type: authoritative_administrative_mapping
    assertion: Quentin maps this major to HIST.
  IDST: &owner_idst
    owner_code: IDST
    academic_unit_id: academic_unit:office_provost
    source: Quentin Kidd workbook pasted department-major cell
    source_type: authoritative_administrative_mapping
    assertion: >-
      Quentin maps this major to IDST; ISO's governed IDST curriculum owner is
      the Office of the Provost rather than a conventional department.
  LAMS_CATALOG: &owner_lams_catalog
    owner_code: LAMS
    academic_unit_id: academic_unit:department_leadership_american_studies
    source: data/acquisition/catalogs/2025-26-undergraduate_catalog.pdf
    source_type: official_catalog
    assertion: The current catalog publishes the major in the Leadership and American Studies section.
  MATH: &owner_math
    owner_code: MATH
    academic_unit_id: academic_unit:department_mathematics
    source: Quentin Kidd workbook pasted department-major cell
    source_type: authoritative_administrative_mapping
    assertion: Quentin maps this major to MATH.
  MCLL: &owner_mcll
    owner_code: MCLL
    academic_unit_id: academic_unit:department_modern_classical_languages_literatures
    source: Quentin Kidd workbook pasted department-major cell
    source_type: authoritative_administrative_mapping
    assertion: Quentin maps this major to MCLL.
  MGMT: &owner_mgmt
    owner_code: MGMT
    academic_unit_id: academic_unit:department_management_marketing
    source: Quentin Kidd workbook pasted department-major cell
    source_type: authoritative_administrative_mapping
    assertion: Quentin maps this major to MGMT.
  MTD: &owner_mtd
    owner_code: MTD
    academic_unit_id: academic_unit:department_music_theatre_dance
    source: Quentin Kidd workbook pasted department-major cell
    source_type: authoritative_administrative_mapping
    assertion: Quentin maps this major to MTD.
  PHIL: &owner_phil
    owner_code: PHIL
    academic_unit_id: academic_unit:department_philosophy_religion
    source: Quentin Kidd workbook pasted department-major cell
    source_type: authoritative_administrative_mapping
    assertion: Quentin maps this major to PHIL.
  POLS: &owner_pols
    owner_code: POLS
    academic_unit_id: academic_unit:department_political_science
    source: Quentin Kidd workbook pasted department-major cell
    source_type: authoritative_administrative_mapping
    assertion: Quentin maps this major to POLS.
  PSYC: &owner_psyc
    owner_code: PSYC
    academic_unit_id: academic_unit:department_psychology
    source: Quentin Kidd workbook pasted department-major cell
    source_type: authoritative_administrative_mapping
    assertion: Quentin maps this major to PSYC.
  SEC: &owner_sec
    owner_code: SEC
    academic_unit_id: academic_unit:sec
    source: Quentin Kidd workbook pasted department-major cell
    source_type: authoritative_administrative_mapping
    assertion: Quentin maps this major to SEC.
  SSWA: &owner_sswa
    owner_code: SSWA
    academic_unit_id: academic_unit:department_sociology_social_work_anthropology
    source: Quentin Kidd workbook pasted department-major cell
    source_type: authoritative_administrative_mapping
    assertion: Quentin maps this major to SSWA.

